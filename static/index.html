<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Companion</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="avatar-panel card">
        <h1>Avatar Companion</h1>
        <canvas id="avatarCanvas" width="520" height="380" aria-label="Animated avatar face"></canvas>
        <div class="status-row">
          <span id="stateBadge" class="badge">state: idle</span>
          <span id="emotionBadge" class="badge">emotion: neutral</span>
        </div>
      </section>

      <section class="chat-panel card">
        <div class="chat-log" id="chatLog" aria-live="polite"></div>

        <div class="input-row">
          <input id="textInput" type="text" placeholder="Type a message..." maxlength="400" />
          <button id="sendBtn">Send</button>
        </div>

        <div class="controls-row">
          <button id="voiceBtn">Start Voice Chat</button>
          <button id="stopSpeakBtn">Stop Speaking</button>
          <button id="sleepBtn">Sleep</button>
        </div>

        <div class="test-grid">
          <div>
            <h3>State Test</h3>
            <div id="stateTests" class="chip-wrap"></div>
          </div>
          <div>
            <h3>Emotion Test</h3>
            <div id="emotionTests" class="chip-wrap"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
